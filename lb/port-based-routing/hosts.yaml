---
all:
  vars:
    ansible_connection: ssh
    ansible_become: true
    ansible_user: ubuntu
    ansible_ssh_private_key_file: /home/ubuntu/sahil-ssh-key.pem


kafka_controller:
  hosts:
    ip-10-0-10-1.ap-south-1.compute.internal:
    ip-10-0-10-2.ap-south-1.compute.internal:
    ip-10-0-10-3.ap-south-1.compute.internal:
kafka_broker:
  hosts:
    ip-10-0-10-1.ap-south-1.compute.internal:
      kafka_broker_custom_listeners:
        client_listener:
          name: advertisedlistener
          hostname: sahil.cp.net
          port: 4431
          ssl_enabled: false
    ip-10-0-10-2.ap-south-1.compute.internal:
      kafka_broker_custom_listeners:
        client_listener:
          name: advertisedlistener
          hostname: sahil.cp.net
          port: 4432
          ssl_enabled: false
    ip-10-0-10-3.ap-south-1.compute.internal:
      kafka_broker_custom_listeners:
        client_listener:
          name: advertisedlistener
          hostname: sahil.cp.net
          port: 4433
          ssl_enabled: false
